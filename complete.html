<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            padding: 0;
        }

        .card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .description {
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 1.05em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1.05em;
        }

        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .output-area {
            margin-top: 40px;
            border-top: 3px solid #667eea;
            padding-top: 30px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .output-header h3 {
            color: #333;
            font-size: 1.5em;
        }

        .test-paper {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-size: 1em;
            line-height: 1.8;
            font-family: "Courier New", monospace;
            max-height: 600px;
            overflow-y: auto;
        }

        .test-paper pre {
            white-space: pre-wrap;
            margin: 0;
        }

        .page-break {
            display: none;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }

        .main-content {
            padding: 40px 30px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
            }

            header, .output-actions, .btn, footer, .form-group, .description, h2, .output-header h3 {
                display: none !important;
            }

            .main-content {
                padding: 0;
            }

            .output-area {
                border: none;
                padding: 0;
                margin: 0;
            }

            .test-paper {
                background: white;
                border: none;
                padding: 20px;
                max-height: none;
                font-family: "SimSun", "宋体", serif;
                font-size: 12pt;
            }

            .page-break {
                display: block;
                page-break-before: always;
                break-before: page;
                height: 0;
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>

                        <option value="medium" selected>中等（海淀区标准）</option>

                </div>

                <button class="btn btn-primary" onclick="generateTest()">🎯 生成随机测试卷</button>

                <div id="test-output" class="output-area" style="display: none;">
                    <div class="output-header">
                        <h3>生成的测试卷</h3>
                        <div class="output-actions">
                            <button class="btn btn-secondary" onclick="window.print()">🖨️ 打印</button>
                            <button class="btn btn-secondary" onclick="downloadTest()">💾 下载</button>
                        </div>
                    </div>
                    <div id="test-content" class="test-paper"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 四年级数学测试系统 | 每次生成题目都不同 | 基于北师大版教材</p>
        </footer>
    </div>

        // 随机打乱数组
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 根据难度筛选题目
        function filterByDifficulty(questions, difficulty, count) {
            let filtered = [];

            if (difficulty === 'easy') {
                const easy = questions.filter(q => q.difficulty === 'easy');
                const medium = questions.filter(q => q.difficulty === 'medium');
                const hard = questions.filter(q => q.difficulty === 'hard');
                filtered = [
                    ...shuffleArray(easy).slice(0, Math.ceil(count * 0.6)),
                    ...shuffleArray(medium).slice(0, Math.ceil(count * 0.3)),
                    ...shuffleArray(hard).slice(0, Math.ceil(count * 0.1))
                ];
            } else if (difficulty === 'medium') {
                const easy = questions.filter(q => q.difficulty === 'easy');
                const medium = questions.filter(q => q.difficulty === 'medium');
                const hard = questions.filter(q => q.difficulty === 'hard');
                filtered = [
                    ...shuffleArray(easy).slice(0, Math.ceil(count * 0.3)),
                    ...shuffleArray(medium).slice(0, Math.ceil(count * 0.5)),
                    ...shuffleArray(hard).slice(0, Math.ceil(count * 0.2))
                ];
            } else if (difficulty === 'hard') {
                const easy = questions.filter(q => q.difficulty === 'easy');
                const medium = questions.filter(q => q.difficulty === 'medium');
                const hard = questions.filter(q => q.difficulty === 'hard');
                filtered = [
                    ...shuffleArray(easy).slice(0, Math.ceil(count * 0.1)),
                    ...shuffleArray(medium).slice(0, Math.ceil(count * 0.4)),
                    ...shuffleArray(hard).slice(0, Math.ceil(count * 0.5))
                ];
            }

            return shuffleArray(filtered).slice(0, count);
        }

            const fillBlank = filterByDifficulty(bank.fillBlank, difficulty, 5);

            const wordProblems = filterByDifficulty(bank.wordProblems, difficulty, 3);

            let content = `四年级数学第${getUnitNumber(unit)}单元测试卷 - ${bank.title}

        function getUnitNumber(unit) {
            const units = { '1': '一', '2': '二', '3': '三', '4': '四', '5': '五', '6': '六', '7': '七', '8': '八' };
            return units[unit] || unit;
        }

        function getDifficultyName(difficulty) {
            const names = {
                'easy': '基础',
                'medium': '中等（海淀区标准）',
                'hard': '提高'
            };
            return names[difficulty] || difficulty;
        }

        function downloadTest() {
            const content = document.getElementById('test-content').textContent;
            const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);

            const unit = document.getElementById('unit-select').value;
            const difficulty = document.getElementById('difficulty-select').value;
            const date = new Date().toISOString().slice(0, 10);

            link.download = `四年级数学第${unit}单元-${difficulty}-${date}.md`;
            link.click();
        }
