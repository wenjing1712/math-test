<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四年级数学测试系统 - 北师大版（海淀区）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1.05em;
        }

        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .output-area {
            margin-top: 40px;
            border-top: 3px solid #667eea;
            padding-top: 30px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .output-header h3 {
            color: #333;
            font-size: 1.5em;
        }

        .test-paper {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-size: 1em;
            line-height: 1.8;
            font-family: "Courier New", monospace;
            max-height: 600px;
            overflow-y: auto;
        }

        .test-paper pre {
            white-space: pre-wrap;
            margin: 0;
        }

        .page-break {
            display: none;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
            }

            header, .output-actions, .btn, footer, .form-group, .description, h2, .output-header h3 {
                display: none !important;
            }

            .main-content {
                padding: 0;
            }

            .output-area {
                border: none;
                padding: 0;
                margin: 0;
            }

            .test-paper {
                background: white;
                border: none;
                padding: 20px;
                max-height: none;
                font-family: "SimSun", "宋体", serif;
                font-size: 12pt;
            }

            .page-break {
                display: block;
                page-break-before: always;
                break-before: page;
                height: 0;
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>

        <div class="main-content">

            </div>

            <div class="form-group">

                </select>

            <button class="btn btn-primary" onclick="generateTest()">生成随机测试卷</button>

            <div id="test-output" class="output-area" style="display: none;">
                <div class="output-header">
                    <h3>生成的测试卷</h3>
                    <div class="output-actions">
                        <button class="btn btn-secondary" onclick="window.print()">打印</button>
                        <button class="btn btn-secondary" onclick="downloadTest()">下载</button>
                    </div>
                </div>
                <div id="test-content" class="test-paper"></div>
            </div>
        </div>

        <footer>
            <p>© 2026 四年级数学测试系统 | 基于北师大版教材</p>
        </footer>

        // 随机打乱数组
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 获取单元编号（s1u1 -> 一）
        function getUnitNumber(unitCode) {
            const unitNum = unitCode.slice(-1);
            const units = {"1": "一", "2": "二", "3": "三", "4": "四", "5": "五", "6": "六", "7": "七", "8": "八"};
            return units[unitNum] || unitNum;
        }

        // 更新单元列表
        function updateUnits() {
            const semester = document.getElementById("semester-select").value;
            const unitSelect = document.getElementById("unit-select");
            const units = semesterUnits[semester];

            // 清空现有选项
            unitSelect.innerHTML = "";

            // 添加新选项
            units.forEach(function(unit) {
                const option = document.createElement("option");
                option.value = unit.value;
                option.textContent = unit.text;
                unitSelect.appendChild(option);
            });

            console.log("单元列表已更新为", semester, "共", units.length, "个单元");
        }

        // 生成测试卷
        function generateTest() {
            const semester = document.getElementById("semester-select").value;

                return;

            const semesterName = semester === "first" ? "上学期" : "下学期";

            // 随机抽取题目
            const multipleChoice = shuffleArray(bank.multipleChoice).slice(0, 5);
            const fillBlank = shuffleArray(bank.fillBlank).slice(0, 5);
            const calculation = shuffleArray(bank.calculation).slice(0, 6);
            const wordProblems = shuffleArray(bank.wordProblems).slice(0, 3);

            let content = "四年级" + semesterName + "数学第" + unitNumber + "单元测试卷 - " + bank.title + "\n";
            content += "（北师大版 · 海淀区标准）\n\n";
            content += "班级：________    姓名：________    学号：________    成绩：________\n\n";
            content += "================================================================================\n\n";
            content += "一、选择题（每题3分，共" + (multipleChoice.length * 3) + "分）\n\n";

            multipleChoice.forEach(function(item, index) {
                content += (index + 1) + ". " + item.q + "\n";
                item.options.forEach(function(opt, i) {
                    content += "   " + String.fromCharCode(65 + i) + ". " + opt + "    ";
                });
                content += "\n\n";
            });

            content += "================================================================================\n\n";
            content += "二、填空题（每空2分，共" + (fillBlank.length * 4) + "分）\n\n";

            fillBlank.forEach(function(item, index) {
                content += (index + multipleChoice.length + 1) + ". " + item.q + "\n\n";
            });

            content += "================================================================================\n\n";
            content += "三、计算题（每题3分，共" + (calculation.length * 3) + "分）\n\n";

            calculation.forEach(function(item, index) {
                content += (index + multipleChoice.length + fillBlank.length + 1) + ". " + item.q + " =\n\n";
            });

            content += "================================================================================\n\n";
            content += "四、应用题（每题6分，共" + (wordProblems.length * 6) + "分）\n\n";

            wordProblems.forEach(function(item, index) {
                content += (index + multipleChoice.length + fillBlank.length + calculation.length + 1) + ". " + item.q + "\n\n\n\n";
            });

            content += "================================================================================\n\n";
            content += "注意事项：\n";
            content += "1. 请认真审题，仔细计算\n";
            content += "2. 计算题要写出完整过程\n";
            content += "3. 应用题要写出算式和答案\n";
            content += "4. 检查时注意单位是否正确\n\n";
            content += "本试卷总分：100分    考试时间：60分钟\n\n\n";
            content += '<div class="page-break"></div>\n\n';
            content += "================================================================================\n";
            content += "================================================================================\n";
            content += "================================================================================\n\n";
            content += "参考答案\n\n";
            content += "================================================================================\n\n";
            content += "一、选择题答案\n\n";

            multipleChoice.forEach(function(item, index) {
                content += (index + 1) + ". " + item.answer + "    ";
                if ((index + 1) % 5 === 0) content += "\n";
            });

            content += "\n\n================================================================================\n\n";
            content += "二、填空题答案\n\n";

            fillBlank.forEach(function(item, index) {
                content += (index + multipleChoice.length + 1) + ". " + item.answer + "\n";

            content += "\n================================================================================\n\n";
            content += "三、计算题答案\n\n";

            calculation.forEach(function(item, index) {

            });

            content += "\n================================================================================\n\n";
            content += "四、应用题答案\n\n";

            wordProblems.forEach(function(item, index) {
                content += (index + multipleChoice.length + fillBlank.length + calculation.length + 1) + ". " + item.answer + "\n\n";
            });

            content += "================================================================================";

            document.getElementById("test-content").innerHTML = "<pre>" + content + "</pre>";
            document.getElementById("test-output").style.display = "block";
            document.getElementById("test-output").scrollIntoView({ behavior: "smooth" });

            console.log("试卷生成成功！");
        }
